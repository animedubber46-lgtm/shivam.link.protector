<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Shivam Link Protector</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .auth-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .auth-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .admin-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
    }
    
    .form-input::placeholder {
      color: var(--text-muted);
    }
    
    .btn-auth {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
    }
    
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }
    
    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      margin-top: 1.5rem;
    }
    
    .back-link:hover {
      color: var(--primary);
    }
    
    .user-login-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    
    .user-login-link:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🔐</div>
        <span class="admin-badge">Admin Access</span>
        <h1 class="auth-title">Admin Login</h1>
        <p class="auth-subtitle">Sign in to access the admin dashboard</p>
      </div>
      
      <form id="admin-login-form">
        <div class="error-message" id="login-error"></div>
        
        <div class="form-group">
          <label class="form-label" for="admin-username">Username</label>
          <input type="text" id="admin-username" class="form-input" placeholder="Enter admin username" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="admin-password">Password</label>
          <input type="password" id="admin-password" class="form-input" placeholder="Enter admin password" required>
        </div>
        
        <button type="submit" class="btn-auth" id="login-btn">
          <span class="btn-text">Sign In as Admin</span>
        </button>
      </form>
      
      <a href="login.html" class="user-login-link">User Login →</a>
      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </div>
  
  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <span class="toast-icon"></span>
    <span class="toast-message"></span>
  </div>
  
  <script>
    const API_BASE = '/api';
    
    // DOM Elements
    const adminLoginForm = document.getElementById('admin-login-form');
    const loginError = document.getElementById('login-error');
    const toast = document.getElementById('toast');
    
    // Show toast
    function showToast(message, type = 'success') {
      const icon = toast.querySelector('.toast-icon');
      const msg = toast.querySelector('.toast-message');
      
      icon.textContent = type === 'success' ? '✓' : '✕';
      msg.textContent = message;
      
      toast.className = `toast ${type}`;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    // Admin login form submission
    adminLoginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;
      
      loginError.style.display = 'none';
      
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.querySelector('.btn-text').textContent = 'Signing in...';
      
      try {
        const response = await fetch(`${API_BASE}/auth/admin-login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showToast('Admin login successful! Redirecting...');
          
          setTimeout(() => {
            window.location.href = 'admin.html';
          }, 1000);
        } else {
          loginError.textContent = data.error;
          loginError.style.display = 'block';
        }
      } catch (error) {
        loginError.textContent = 'Failed to connect to server';
        loginError.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = 'Sign In as Admin';
      }
    });
    
    // Check if already logged in as admin
    async function checkAuth() {
      try {
        const response = await fetch(`${API_BASE}/auth/check`);
        const data = await response.json();
        
        if (data.isAdmin) {
          window.location.href = 'admin.html';
        }
      } catch (error) {
        // Not logged in, stay on page
      }
    }
    
    checkAuth();
  </script>
</body>
</html>
